<div class="sidebar" [class.collapsed]="isCollapsed$ | async">
  <!-- Sidebar Header -->
  <div class="sidebar-header">
    <div class="logo-area">
      <img src="/nurse_logo.png" alt="Admin Logo" class="admin-logo" />
      <div class="header-text" *ngIf="!(isCollapsed$ | async)">
        <span class="portal-name">Admin Portal</span>
        <span class="org-name">Barangay Health Center</span>
      </div>
    </div>
    <button class="toggle-btn" (click)="toggleSidebar()" [title]="(isCollapsed$ | async) ? 'Expand' : 'Collapse'">
      {{ (isCollapsed$ | async) ? '≫' : '≪' }}
    </button>
  </div>

  <!-- Navigation Menu -->
  <nav class="sidebar-nav">
    <ul>
      <li>
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
          <span class="icon">📊</span>
          <span class="label" *ngIf="!(isCollapsed$ | async)">Dashboard</span>
        </a>
      </li>
      <li>
        <a routerLink="/immunization-records" routerLinkActive="active" class="nav-item">
          <span class="icon">📒</span>
          <span class="label" *ngIf="!(isCollapsed$ | async)">Immunization Records</span>
        </a>
      </li>
      <li>
        <a routerLink="/manage-appointment" routerLinkActive="active" class="nav-item">
          <span class="icon">📁</span>
          <span class="label" *ngIf="!(isCollapsed$ | async)">Manage Appointments</span>
        </a>
      </li>
      <li>
        <a routerLink="/pending-appointment" routerLinkActive="active" class="nav-item">
          <span class="icon">📋</span>
          <span class="label" *ngIf="!(isCollapsed$ | async)">Pending Appointments</span>
        </a>
      </li>
      <li>
        <a routerLink="/sms-notification" routerLinkActive="active" class="nav-item">
          <span class="icon">💬</span>
          <span class="label" *ngIf="!(isCollapsed$ | async)">SMS Notification</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Sidebar Footer (Profile) -->
  <div class="sidebar-footer">
    <div class="user-profile" *ngIf="!(isCollapsed$ | async)">
      <div class="avatar">👤</div>
      <div class="user-info">
        <span class="user-name">Nurse</span>
        <span class="user-role">Health Worker</span>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()">
      <span class="label" *ngIf="!(isCollapsed$ | async)">Logout</span>
    </button>
  </div>
</div>
